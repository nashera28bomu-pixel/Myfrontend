<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Watch — Cymor Movie Hub</title>
<link rel="stylesheet" href="style.css"/>

<style>
  body { padding: 16px; }
  .tab-pills { display:flex; gap:8px; margin:20px 0; border-bottom:1px solid var(--border); }
  .tab-pill { padding:10px 14px; cursor:pointer; color:var(--text3); border-bottom:2px solid transparent; }
  .tab-pill.active { color:var(--gold); border-color:var(--gold); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .dl-quality-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px; border:1px solid var(--border);
    margin-bottom:8px; border-radius:8px; background:var(--card);
  }

  .dl-quality-btn {
    background:var(--gold); color:var(--bg); padding:6px 12px;
    border-radius:20px; cursor:pointer; border:none; font-weight:600;
  }

  #videoPlayer {
    width:100%; aspect-ratio: 16/9;
    background:black; border-radius:12px; margin-bottom:15px;
  }
  
  .stream-controls { display:flex; gap:10px; margin-bottom:15px; }
  .stream-status { font-size:13px; color:var(--text2); margin-bottom:15px; font-family:monospace; }
</style>
</head>

<body>

<div id="detail-info">
  <div class="loading-center"><div class="spinner"></div></div>
</div>

<script src="app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const pageId = params.get('id');
const type = params.get('type') || 'movie';
const isSeries = type === 'series';

let details = null, dlFiles = null, currentMagnet = null, destroyStream = null;

async function loadDetail() {
  if (!pageId) return;
  try {
    details = isSeries ? await cymor.seriesDetails(pageId) : await cymor.movieDetails(pageId);
    renderMainUI();
    dlFiles = isSeries ? await cymor.episodeSources(pageId, 1, 1) : await cymor.movieSources(pageId);
    renderDownloads(dlFiles);
  } catch (e) {
    document.getElementById('detail-info').innerHTML = `<h3>Error</h3><p>${e.message}</p>`;
  }
}

function renderMainUI() {
  document.getElementById('detail-info').innerHTML = `
    <h2>${details.title}</h2>
    <video id="videoPlayer" controls playsinline></video>
    
    <div class="stream-controls">
      <button class="dl-quality-btn" onclick="startStreaming()">▶ Watch Now</button>
      <button class="dl-quality-btn" style="background:var(--text3)" onclick="stopStreaming()">⛔ Stop</button>
    </div>
    <div id="stream-status" class="stream-status">Ready</div>

    <div class="tab-pills">
      <div class="tab-pill active" onclick="switchTab('downloads')">Downloads/Sources</div>
    </div>

    <div class="tab-panel active" id="tab-downloads">
      <div id="downloads"></div>
    </div>
  `;
}

function renderDownloads(files) {
  const box = document.getElementById('downloads');
  const list = files?.sources || files?.videos || [];
  box.innerHTML = list.length ? list.map(v => `
    <div class="dl-quality-item">
      <span>${v.quality || 'HD'}</span>
      <div>
        <button class="dl-quality-btn" onclick="selectStream('${encodeURIComponent(v.magnet || v.url)}')">Select</button>
        <button class="dl-quality-btn" onclick="downloadFile('${encodeURIComponent(v.magnet || v.url)}')">⬇</button>
      </div>
    </div>`).join('') : 'No sources found';
}

function selectStream(magnet) {
  currentMagnet = decodeURIComponent(magnet);
  document.getElementById("stream-status").innerText = "Selected: " + currentMagnet.substring(0, 20) + "...";
}

function startStreaming() {
  if (!currentMagnet) return alert("Select a source first");
  const status = document.getElementById("stream-status");
  if (destroyStream) destroyStream();
  status.innerText = "Connecting to peer network...";
  destroyStream = streamMagnet(currentMagnet, "videoPlayer", 
    (p) => status.innerText = `Peers: ${p.peers} | ${p.progress}% | ${fmtSpeed(p.downloadSpeed)}`,
    () => status.innerText = "Playing Live ▶",
    (err) => status.innerText = "Error: " + err
  );
}

function stopStreaming() {
  if (destroyStream) destroyStream();
  const video = document.getElementById("videoPlayer");
  video.pause(); video.src = "";
  document.getElementById("stream-status").innerText = "Stopped";
}

function downloadFile(url) { window.open(cymor.torrentProxy(decodeURIComponent(url), "video.mp4"), "_blank"); }
function switchTab(tab) { /* Logic for tabs */ }

document.addEventListener('DOMContentLoaded', loadDetail);
</script>
</body>
</html>
