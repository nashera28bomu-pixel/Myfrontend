<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Watch — Cymor Movie Hub</title>
<link rel="stylesheet" href="style.css"/>
<!-- HLS.js for direct stream playback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  body { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* ── Player ── */
  .player-wrap {
    position: relative; width: 100%; aspect-ratio: 16/9;
    background: #000; border-radius: 12px; overflow: hidden;
    margin-bottom: 14px;
  }
  #mainPlayer {
    width: 100%; height: 100%; display: block; background: #000;
  }
  .player-overlay {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); flex-direction: column; gap: 12px;
    cursor: pointer;
  }
  .play-btn {
    background: var(--gold); color: var(--bg); border: none;
    border-radius: 50%; width: 68px; height: 68px;
    font-size: 28px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .overlay-title { color: #fff; font-size: 14px; opacity: 0.8; text-align: center; padding: 0 20px; }

  /* ── Provider bar ── */
  .provider-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .provider-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: var(--text2); cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  .provider-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 700; }

  /* ── Status ── */
  .stream-status { font-size: 12px; color: var(--text2); font-family: monospace; margin-bottom: 14px; min-height: 18px; }

  /* ── Meta ── */
  .detail-meta { margin-bottom: 12px; }
  .detail-meta h2 { margin: 0 0 8px; font-size: 1.2rem; }
  .detail-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .badge { background: var(--card); border: 1px solid var(--border); padding: 3px 8px; border-radius: 20px; font-size: 12px; color: var(--text2); }
  .badge.gold { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 700; }
  .overview { font-size: 13px; color: var(--text2); line-height: 1.6; margin: 0 0 16px; }

  /* ── Tabs ── */
  .tab-pills { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab-pill { padding: 10px 16px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; font-size: 14px; font-weight: 500; }
  .tab-pill.active { color: var(--gold); border-color: var(--gold); }
  .tab-panel { display: none; padding: 16px 0; }
  .tab-panel.active { display: block; }

  /* ── Episodes ── */
  .season-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .season-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text2); cursor: pointer; font-size: 13px; }
  .season-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  .episode-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .ep-btn { aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .ep-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

  /* ── Downloads ── */
  .dl-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--border); margin-bottom: 8px; border-radius: 10px; background: var(--card); }
  .dl-info { display: flex; flex-direction: column; gap: 3px; }
  .dl-quality { font-weight: 700; font-size: 14px; }
  .dl-meta { font-size: 12px; color: var(--text2); }
  .dl-btn { background: var(--gold); color: var(--bg); padding: 7px 14px; border-radius: 20px; cursor: pointer; border: none; font-weight: 600; font-size: 13px; text-decoration: none; display: inline-block; }
  .dl-btn.secondary { background: var(--card); color: var(--text2); border: 1px solid var(--border); margin-right: 6px; }

  /* ── Cast ── */
  .cast-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
  .cast-item { min-width: 70px; text-align: center; }
  .cast-item img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
  .cast-name { font-size: 11px; margin-top: 4px; color: var(--text2); }
  .cast-char { font-size: 10px; color: var(--text3); }

  /* ── Recommendations ── */
  .rec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .rec-item { text-decoration: none; }
  .rec-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; display: block; }
  .rec-title { font-size: 11px; color: var(--text2); margin-top: 4px; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  .loading-center { display: flex; justify-content: center; padding: 40px 0; }
  .no-data { color: var(--text3); font-size: 14px; padding: 16px 0; }
</style>
</head>
<body>

<div id="page-root">
  <div class="loading-center"><div class="spinner"></div></div>
</div>

<script src="app.js"></script>
<script>
const params   = new URLSearchParams(location.search);
const pageId   = params.get('id');
const type     = params.get('type') || 'movie';
const isSeries = type === 'series';

let mediaDetails  = null;
let allSources    = [];
let currentSource = 0;
let currentSeason = 1;
let currentEp     = 1;
let seasonData    = {};
let hlsInstance   = null;

/* ── BOOT ────────────────────────────────────────── */
async function init() {
  if (!pageId) {
    document.getElementById('page-root').innerHTML = '<p style="padding:20px">No content ID provided.</p>';
    return;
  }
  try {
    const [detailRes, sourcesRes] = await Promise.all([
      isSeries ? cymor.seriesDetails(pageId) : cymor.movieDetails(pageId),
      isSeries
        ? cymor.episodeSources(pageId, currentSeason, currentEp)
        : cymor.movieSources(pageId),
    ]);

    mediaDetails = isSeries ? detailRes.series : detailRes.movie;
    allSources   = sourcesRes.sources || [];

    renderPage();

    // Recommendations in background
    cymor.getRecommendations(pageId, type).then(data => {
      const grid = document.getElementById('rec-grid');
      const list = data?.results || [];
      if (grid) grid.innerHTML = list.length
        ? list.map(m => `
            <a href="watch.html?id=${m.id}&type=${m.type}" class="rec-item">
              <img src="${m.poster || ''}" onerror="this.style.display='none'" loading="lazy">
              <div class="rec-title">${m.title || ''}</div>
            </a>`).join('')
        : '<p class="no-data">No recommendations found.</p>';
    });

  } catch (e) {
    document.getElementById('page-root').innerHTML =
      `<div style="padding:20px"><h3>Failed to load</h3><p>${e.message}</p><a href="index.html">← Home</a></div>`;
  }
}

/* ── RENDER ──────────────────────────────────────── */
function renderPage() {
  const d = mediaDetails;
  if (!d) return;
  document.title = `${d.title} — Cymor Movie Hub`;

  document.getElementById('page-root').innerHTML = `

    <!-- Provider bar -->
    <div class="provider-bar" id="provider-bar">
      ${allSources.map((s, i) => `
        <button class="provider-btn ${i === 0 ? 'active' : ''}"
          id="pbtn-${i}" onclick="switchProvider(${i})">${s.provider}</button>
      `).join('')}
    </div>

    <!-- Player -->
    <div class="player-wrap">
      <div class="player-overlay" id="player-overlay" onclick="startPlayer()">
        <button class="play-btn">▶</button>
        <span class="overlay-title">${d.title}${isSeries ? ` — S${currentSeason}E${currentEp}` : ''}</span>
      </div>
      <video id="mainPlayer" controls playsinline></video>
    </div>
    <div class="stream-status" id="stream-status">
      ${allSources[0]?.provider ? `${allSources[0].provider} ready — tap ▶ to play` : 'No sources found'}
    </div>

    <!-- Meta -->
    <div class="detail-meta">
      <h2>${d.title}</h2>
      <div class="detail-badges">
        ${d.year    ? `<span class="badge">${d.year}</span>` : ''}
        ${d.rating  ? `<span class="badge gold">⭐ ${d.rating}</span>` : ''}
        ${d.runtime ? `<span class="badge">${d.runtime} min</span>` : ''}
        ${d.seasons ? `<span class="badge">${d.seasons} Seasons</span>` : ''}
        ${(d.genres || []).slice(0, 3).map(g => `<span class="badge">${g}</span>`).join('')}
      </div>
      ${d.overview ? `<p class="overview">${d.overview}</p>` : ''}
    </div>

    <!-- Tabs -->
    <div class="tab-pills">
      ${isSeries ? `<div class="tab-pill active" id="tpill-episodes" onclick="switchTab('episodes')">Episodes</div>` : ''}
      <div class="tab-pill ${isSeries ? '' : 'active'}" id="tpill-downloads" onclick="switchTab('downloads')">Downloads</div>
      <div class="tab-pill" id="tpill-cast" onclick="switchTab('cast')">Cast</div>
      <div class="tab-pill" id="tpill-more" onclick="switchTab('more')">More Like This</div>
    </div>

    ${isSeries ? `
    <div class="tab-panel active" id="tab-episodes">
      <div class="season-row" id="season-row">
        ${(mediaDetails.season_list || Array.from({length: d.seasons || 1}, (_, i) => ({season_number: i + 1}))).map(s => `
          <button class="season-btn ${s.season_number === 1 ? 'active' : ''}"
            id="sbtn-${s.season_number}" onclick="selectSeason(${s.season_number})">S${s.season_number}</button>
        `).join('')}
      </div>
      <div class="episode-grid" id="episode-grid">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>` : ''}

    <div class="tab-panel ${isSeries ? '' : 'active'}" id="tab-downloads">
      <div id="downloads-content">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-cast">
      <div class="cast-scroll">
        ${(d.cast || []).length
          ? d.cast.map(c => `
              <div class="cast-item">
                ${c.photo ? `<img src="${c.photo}" loading="lazy" onerror="this.style.display='none'">` : `<div style="width:60px;height:60px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:22px">👤</div>`}
                <div class="cast-name">${c.name}</div>
                <div class="cast-char">${c.character || ''}</div>
              </div>`).join('')
          : '<p class="no-data">No cast info available.</p>'}
      </div>
    </div>

    <div class="tab-panel" id="tab-more">
      <div class="rec-grid" id="rec-grid">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>
  `;

  if (isSeries) loadEpisodes(1);
  loadDownloads();
}

/* ── PLAYER ──────────────────────────────────────── */
function startPlayer() {
  if (!allSources.length) { setStatus('No streaming sources available.'); return; }
  const overlay = document.getElementById('player-overlay');
  if (overlay) overlay.style.display = 'none';
  loadStream(allSources[currentSource].url);
}

function loadStream(url) {
  const video = document.getElementById('mainPlayer');
  if (!video) return;

  // Destroy previous HLS instance
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  setStatus(`Loading ${allSources[currentSource].provider}...`);

  // Try HLS.js first (for .m3u8 streams)
  if (Hls.isSupported()) {
    hlsInstance = new Hls({ enableWorker: true });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      setStatus(`▶ Playing via ${allSources[currentSource].provider}`);
    });
    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        // HLS failed — try as direct MP4
        hlsInstance.destroy(); hlsInstance = null;
        video.src = url;
        video.play().catch(() => {});
        setStatus(`▶ Playing via ${allSources[currentSource].provider} (direct)`);
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Native HLS (Safari/iOS)
    video.src = url;
    video.play().catch(() => {});
    setStatus(`▶ Playing via ${allSources[currentSource].provider}`);
  } else {
    // Fallback direct src
    video.src = url;
    video.play().catch(() => {});
    setStatus(`▶ Playing via ${allSources[currentSource].provider}`);
  }
}

function switchProvider(index) {
  currentSource = index;
  allSources.forEach((_, i) => {
    const btn = document.getElementById(`pbtn-${i}`);
    if (btn) btn.className = `provider-btn ${i === index ? 'active' : ''}`;
  });
  const overlay = document.getElementById('player-overlay');
  const isPlaying = overlay && overlay.style.display === 'none';
  if (isPlaying) {
    loadStream(allSources[index].url);
  } else {
    setStatus(`${allSources[index].provider} selected — tap ▶ to play`);
  }
}

function setStatus(msg) {
  const el = document.getElementById('stream-status');
  if (el) el.textContent = msg;
}

/* ── EPISODES ────────────────────────────────────── */
async function selectSeason(season) {
  currentSeason = season;
  currentEp = 1;
  document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`sbtn-${season}`);
  if (btn) btn.classList.add('active');
  await loadEpisodes(season);
}

async function loadEpisodes(season) {
  const grid = document.getElementById('episode-grid');
  if (!grid) return;
  grid.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    if (!seasonData[season]) {
      const data = await cymor.seriesSeasons(pageId, season);
      seasonData[season] = data.episodes || [];
    }
    const episodes = seasonData[season];
    grid.innerHTML = episodes.length
      ? episodes.map(ep => `
          <button class="ep-btn ${ep.episode_number === currentEp && season === currentSeason ? 'active' : ''}"
            id="epbtn-${ep.episode_number}"
            onclick="selectEpisode(${season}, ${ep.episode_number})">${ep.episode_number}</button>`).join('')
      : '<p class="no-data">No episodes found.</p>';
  } catch {
    grid.innerHTML = Array.from({length: 20}, (_, i) => `
      <button class="ep-btn ${i + 1 === currentEp ? 'active' : ''}"
        onclick="selectEpisode(${season}, ${i + 1})">${i + 1}</button>`).join('');
  }
}

async function selectEpisode(season, episode) {
  currentSeason = season;
  currentEp     = episode;
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`epbtn-${episode}`);
  if (btn) btn.classList.add('active');

  setStatus(`Fetching S${season}E${episode} sources...`);
  try {
    const data = await cymor.episodeSources(pageId, season, episode);
    allSources    = data.sources || [];
    currentSource = 0;

    // Rebuild provider bar
    const bar = document.getElementById('provider-bar');
    if (bar) bar.innerHTML = allSources.map((s, i) => `
      <button class="provider-btn ${i === 0 ? 'active' : ''}"
        id="pbtn-${i}" onclick="switchProvider(${i})">${s.provider}</button>`).join('');

    // Reset overlay
    const overlay = document.getElementById('player-overlay');
    if (overlay) {
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <button class="play-btn">▶</button>
        <span class="overlay-title">S${season}E${episode} — tap to play</span>`;
      overlay.onclick = startPlayer;
    }

    // Stop current stream
    const video = document.getElementById('mainPlayer');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (video) { video.pause(); video.src = ''; }

    setStatus(`S${season}E${episode} ready — tap ▶ to play`);
    loadDownloads(season, episode);
  } catch (e) {
    setStatus(`Failed: ${e.message}`);
  }
}

/* ── DOWNLOADS ───────────────────────────────────── */
async function loadDownloads(season = currentSeason, episode = currentEp) {
  const box = document.getElementById('downloads-content');
  if (!box) return;
  box.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const data = isSeries
      ? await cymor.seriesDownloads(pageId, season, episode)
      : await cymor.movieDownloads(pageId);
    const list = data?.downloads || [];
    if (!list.length) {
      box.innerHTML = `<p class="no-data">${data?.message || 'No downloads available for this title.'}</p>`;
      return;
    }
    box.innerHTML = list.map(d => `
      <div class="dl-item">
        <div class="dl-info">
          <span class="dl-quality">${d.quality || 'HD'}${d.type ? ` · ${d.type}` : ''}</span>
          <span class="dl-meta">${d.size || ''}${d.seeds ? ` · ${d.seeds} seeds` : ''}</span>
        </div>
        <div>
          ${d.torrent_url ? `<a class="dl-btn secondary" href="${d.torrent_url}" target="_blank">Torrent</a>` : ''}
          ${d.magnet      ? `<a class="dl-btn" href="${d.magnet}" target="_blank">Magnet</a>` : ''}
        </div>
      </div>`).join('');
  } catch (e) {
    box.innerHTML = `<p class="no-data">Downloads unavailable: ${e.message}</p>`;
  }
}

/* ── TABS ────────────────────────────────────────── */
function switchTab(tab) {
  const tabs = isSeries ? ['episodes', 'downloads', 'cast', 'more'] : ['downloads', 'cast', 'more'];
  tabs.forEach(t => {
    const panel = document.getElementById(`tab-${t}`);
    const pill  = document.getElementById(`tpill-${t}`);
    if (panel) panel.classList.toggle('active', t === tab);
    if (pill)  pill.classList.toggle('active',  t === tab);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
