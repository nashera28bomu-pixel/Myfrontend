<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Watch — Cymor Movie Hub</title>
<link rel="stylesheet" href="style.css"/>

<style>
.tab-pills{display:flex;gap:8px;margin:12px 0;border-bottom:1px solid var(--border)}
.tab-pill{padding:10px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent}
.tab-pill.active{color:var(--gold);border-color:var(--gold)}
.tab-panel{display:none}
.tab-panel.active{display:block}

.dl-quality-item{
  display:flex;justify-content:space-between;
  padding:10px;border:1px solid var(--border);
  margin-bottom:8px;border-radius:8px;
}

.dl-quality-btn{
  background:var(--gold);
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
  border:none;
  font-weight:600;
}

#videoPlayer{
  width:100%;
  max-height:360px;
  background:black;
  border-radius:12px;
  margin-bottom:10px;
}
.stream-bar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.stream-status{
  font-size:12px;
  color:var(--text3);
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="detail-hero"></div>

<div id="detail-info">
  <div style="padding:20px">Loading...</div>
</div>

<script src="app.js"></script>

<script>
const params = new URLSearchParams(location.search);

const pageId = params.get('id');
const type = params.get('type') || 'movie';
const isSeries = type === 'series';

let details = null;
let dlFiles = null;
let currentSeason = 1;
let currentEp = 1;

let currentMagnet = null;
let destroyStream = null;

/* ─────────────────────────────
   LOAD DATA
───────────────────────────── */
async function loadDetail() {
  if (!pageId) {
    document.getElementById('detail-info').innerHTML =
      "<h3>No ID provided</h3>";
    return;
  }

  try {
    details = isSeries
      ? await cymor.seriesDetails(pageId)
      : await cymor.movieDetails(pageId);

    if (!details) throw new Error("Empty response");

    renderUI();

    dlFiles = isSeries
      ? await cymor.episodeSources(pageId, currentSeason, currentEp)
      : await cymor.movieSources(pageId);

    renderDownloads(dlFiles);

  } catch (e) {
    console.error(e);
    document.getElementById('detail-info').innerHTML =
      `<h3>Failed to load</h3><p>${e.message}</p>`;
  }
}

/* ─────────────────────────────
   UI
───────────────────────────── */
function renderUI() {
  document.title = details.title;

  document.getElementById('detail-hero').innerHTML = `
    <img src="${details.poster}" style="width:100%;max-height:300px;object-fit:cover"/>
  `;

  document.getElementById('detail-info').innerHTML = `
    <h2>${details.title}</h2>

    <!-- 🎬 STREAM PLAYER -->
    <video id="videoPlayer" controls></video>

    <div class="stream-bar">
      <button class="dl-quality-btn" onclick="startStreaming()">▶ Watch Now</button>
      <button class="dl-quality-btn" onclick="stopStreaming()">⛔ Stop</button>
    </div>

    <div id="stream-status" class="stream-status"></div>

    <!-- TABS -->
    <div class="tab-pills">
      <div class="tab-pill active" onclick="switchTab('downloads')">Downloads</div>
      ${isSeries ? `<div class="tab-pill" onclick="switchTab('episodes')">Episodes</div>` : ''}
    </div>

    <div class="tab-panel active" id="tab-downloads">
      <div id="downloads"></div>
    </div>

    ${isSeries ? `
    <div class="tab-panel" id="tab-episodes">
      <button onclick="loadEpisode()">Load Episode</button>
    </div>` : ''}
  `;
}

/* ─────────────────────────────
   DOWNLOADS + MAGNET SELECT
───────────────────────────── */
function renderDownloads(files) {
  const box = document.getElementById('downloads');
  if (!box) return;

  const list = files?.sources || files?.videos || [];

  if (!list.length) {
    box.innerHTML = "No downloads found";
    return;
  }

  box.innerHTML = list.map(v => {
    const magnet = v.magnet || v.url;

    return `
      <div class="dl-quality-item">
        <div>${v.quality || 'HD'}</div>

        <div style="display:flex;gap:8px;">
          <button class="dl-quality-btn"
            onclick="selectStream('${encodeURIComponent(magnet)}')">
            ▶ Select
          </button>

          <button class="dl-quality-btn"
            onclick="downloadFile('${encodeURIComponent(magnet)}')">
            ⬇
          </button>
        </div>
      </div>
    `;
  }).join('');
}

/* ─────────────────────────────
   STREAM LOGIC (WEBTORRENT)
───────────────────────────── */
function selectStream(magnet) {
  currentMagnet = decodeURIComponent(magnet);
  document.getElementById("stream-status").innerText =
    "Selected source ready ▶ click Watch Now";
}

function startStreaming() {
  if (!currentMagnet) {
    alert("Select a source first");
    return;
  }

  const video = document.getElementById("videoPlayer");
  const status = document.getElementById("stream-status");

  if (destroyStream) destroyStream();

  status.innerText = "Connecting...";

  destroyStream = streamMagnet(
    currentMagnet,
    "videoPlayer",
    (p) => {
      status.innerText =
        `Peers: ${p.peers} | ${p.progress}% | ${fmtSpeed(p.downloadSpeed)}`;
    },
    () => {
      status.innerText = "Playing ▶";
      video.play();
    },
    (err) => {
      console.error(err);
      status.innerText = "Stream error: " + err;
    }
  );
}

function stopStreaming() {
  const video = document.getElementById("videoPlayer");

  if (destroyStream) destroyStream();
  destroyStream = null;
  currentMagnet = null;

  if (video) {
    video.pause();
    video.removeAttribute("src");
    video.load();
  }

  document.getElementById("stream-status").innerText = "Stopped";
}

/* ─────────────────────────────
   DOWNLOAD FALLBACK
───────────────────────────── */
function downloadFile(url) {
  const real = decodeURIComponent(url);
  window.open(cymor.torrentProxy(real, "video.mp4"), "_blank");
}

/* ─────────────────────────────
   EPISODES
───────────────────────────── */
async function loadEpisode() {
  dlFiles = await cymor.episodeSources(pageId, currentSeason, currentEp);
  renderDownloads(dlFiles);
}

/* ─────────────────────────────
   TABS
───────────────────────────── */
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

/* ─────────────────────────────
   INIT
───────────────────────────── */
document.addEventListener('DOMContentLoaded', loadDetail);
</script>

</body>
</html>
